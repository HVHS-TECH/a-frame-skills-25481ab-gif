<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
            <a-sphere position="0 4 -4" color="white" ></a-sphere>
            <a-sphere position="0 2 -4" color="white" ></a-sphere>
            <a-sphere position="0 0 -4" color="white" ></a-sphere>
         <a-cone 
        position="2 4 -5"
        color="red"
        radius-top="0.5"
        scale="1.5 1 1"
    ></a-cone>
        </a-scene>
    </body>
</html>

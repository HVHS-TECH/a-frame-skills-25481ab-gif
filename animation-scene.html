<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="black"></a-sky>
<a-sphere color="yellow" radius-bottom="5" radius-top="3"
                position="0 2 -4" height="4 4 4"
            ></a-sphere>
<a-sphere position="0 4 -4" color="green" scale="0.3 0.3 0.3" 
                     animation="
                    property:position;
                    from:-4 2 -22;
                    to:4 2 -8;
                    dur:2000;
                    loop:true;
                    dir:alternate"

            ></a-sphere>
        </a-scene>
    </body>
</html>
